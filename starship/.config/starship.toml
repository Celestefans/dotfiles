"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](peach)\
$directory\
[](bg:yellow fg:peach)\
$git_branch\
$git_status\
[](fg:yellow)\
$line_break\
$character"""

palette = 'catppuccin_mocha'

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 1    # 只显示当前目录名
truncation_symbol = ""   # 不需要省略符号

[git_branch]
symbol = ""
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
style = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[❯](bold fg:green)'
error_symbol = '[❯](bold fg:red)'

[os]
disabled = true
[username]
disabled = true
[nodejs]
disabled = true
[c]
disabled = true
[rust]
disabled = true
